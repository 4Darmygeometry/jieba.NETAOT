name: Build, Test, and Publish

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Segmenter (all frameworks)
        run: dotnet build src/Segmenter/Segmenter.csproj -c Release

      - name: Build Analyser (all frameworks)
        run: dotnet build src/Analyser/Analyser.csproj -c Release

      - name: Build jieba.NETAOT (all frameworks)
        run: dotnet build src/jieba.NETAOT/jieba.NETAOT.csproj -c Release

      - name: Build Segmenter.Cli (all frameworks)
        run: dotnet build src/Segmenter.Cli/Segmenter.Cli.csproj -c Release

      - name: Build AotTest
        run: dotnet build test/AotTest/AotTest.csproj -c Release

      - name: Build Segmenter.Tests
        run: dotnet build test/Segmenter.Tests/Segmenter.Tests.csproj -c Release

      - name: Build NetFrameworkTest
        run: dotnet build test/NetFrameworkTest/NetFrameworkTest.csproj -c Release

      - name: Run tests
        run: dotnet test test/Segmenter.Tests/Segmenter.Tests.csproj -c Release -v normal

  aot-test:
    runs-on: windows-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish AOT
        run: dotnet publish test/AotTest/AotTest.csproj -c Release -r win-x64

      - name: Run AOT test
        run: test/AotTest/bin/Release/net10.0/win-x64/publish/JiebaNet.AotTest.exe

  netframework-test:
    runs-on: windows-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build .NET Framework 4.8 test
        run: dotnet build test/NetFrameworkTest/NetFrameworkTest.csproj -c Release

      - name: Run .NET Framework 4.8 test
        run: test/NetFrameworkTest/bin/Release/net48/JiebaNet.NetFrameworkTest.exe

  publish-nuget:
    runs-on: windows-latest
    needs: [ build-and-test, aot-test, netframework-test ]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build all projects
        run: |
          dotnet build src/Segmenter/Segmenter.csproj -c Release
          dotnet build src/Analyser/Analyser.csproj -c Release

      - name: Pack jieba.NETAOT
        run: |
          dotnet msbuild -t:Pack -p:Configuration=Release -p:Version=${{ steps.get_version.outputs.VERSION }} src/jieba.NETAOT/jieba.NETAOT.csproj
          mkdir -p artifacts
          cp src/jieba.NETAOT/bin/Release/jieba.NETAOT.*.nupkg artifacts/

      - name: Publish to NuGet.org
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
